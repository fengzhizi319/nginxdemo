# =============================================================================
# Nginx 主配置文件 nginx.conf
# =============================================================================
# Nginx 采用“主配置 + 子配置”的方式组织：
# - nginx.conf：全局配置，影响所有 worker 进程。
# - conf.d/*.conf：站点/业务配置，通过 include 引入。
#
# 本文件使用项目内的相对路径（PROJECT_DIR/nginx/...），方便本地学习，
# 不需要修改系统 /etc/nginx 目录。
# =============================================================================

# 指定运行 Nginx worker 进程的用户。设置为 nobody 可以降低权限风险。
# 如果启动时报权限错误，可改为当前用户名，但不建议生产环境使用 root 运行 worker。
user nobody;

# Nginx worker 进程数量。通常设置为 CPU 核心数，auto 表示自动检测。
worker_processes auto;

# PID 文件路径：记录 Nginx 主进程的进程号，stop/reload 时会读取它。
# 放在项目目录内，避免写入 /run 需要 root 权限。
pid /home/charles/code/nginxdemo/nginx/logs/nginx.pid;

# 错误日志路径和级别。级别从低到高：debug < info < notice < warn < error < crit < alert < emerg
error_log /home/charles/code/nginxdemo/nginx/logs/error.log warn;

# =============================================================================
# events 块：配置 Nginx 与连接处理相关的参数
# =============================================================================
events {
    # 单个 worker 进程能同时处理的最大连接数
    worker_connections 1024;

    # 使用 epoll（Linux 下高效的多路复用 IO 模型）
    use epoll;

    # 允许一个 worker 同时接受多个新连接
    multi_accept on;
}

# =============================================================================
# http 块：HTTP 服务器相关配置
# =============================================================================
http {
    # 引入 MIME 类型文件，告诉浏览器如何解析不同后缀的文件。
    # 这里使用 Nginx 内置的 mime.types（如果系统没有，可注释掉或复制一份到项目内）。
    include /home/charles/code/nginxdemo/nginx/mime.types;

    # 默认 MIME 类型，当文件后缀无法识别时使用。
    default_type application/octet-stream;

    # 日志格式定义：main 是格式名称，后面是日志字段。
    # $remote_addr：客户端 IP
    # $time_local：请求时间
    # "$request"：请求行
    # $status：HTTP 状态码
    # $body_bytes_sent：返回给客户端的字节数（不含响应头）
    # "$http_referer"：来源页面
    # "$http_user_agent"：浏览器 User-Agent
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 访问日志路径和使用的格式
    access_log /home/charles/code/nginxdemo/nginx/logs/access.log main;

    # 开启 sendfile，提升静态文件传输效率（零拷贝）
    sendfile on;

    # 优化 TCP 包发送，减少网络报文数量
    tcp_nopush on;
    tcp_nodelay on;

    # 长连接超时时间
    keepalive_timeout 65;

    # 开启 gzip 压缩，减少静态资源传输大小
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 临时文件目录（默认会使用 /var/lib/nginx，这里改为项目内目录）
    client_body_temp_path /home/charles/code/nginxdemo/nginx/tmp/client_body;
    fastcgi_temp_path     /home/charles/code/nginxdemo/nginx/tmp/fastcgi;
    proxy_temp_path       /home/charles/code/nginxdemo/nginx/tmp/proxy;
    scgi_temp_path        /home/charles/code/nginxdemo/nginx/tmp/scgi;
    uwsgi_temp_path       /home/charles/code/nginxdemo/nginx/tmp/uwsgi;

    # 引入站点配置文件
    include /home/charles/code/nginxdemo/nginx/conf.d/*.conf;
}

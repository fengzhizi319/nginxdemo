# =============================================================================
# 站点配置文件 default.conf
# =============================================================================
# 该文件被 nginx.conf 通过 include 引入。
# 作用：定义一个虚拟主机（server 块），处理对 Nginx 的 HTTP 请求。
#
# 本示例演示三个核心功能：
# 1. 静态资源服务：Nginx 直接返回前端构建产物（HTML/JS/CSS）。
# 2. 反向代理：把 /api 请求转发给后端的 Tomcat。
# 3. 负载均衡：通过 upstream 定义多个后端实例（可选，详见文档 08）。
# =============================================================================

# ------------------------------------------------------------------------------
# upstream 块：定义后端服务器池（负载均衡目标）。
# ------------------------------------------------------------------------------
# 名称 backend_servers 可自定义，后面 proxy_pass 中引用。
# 当前只配置了一台 Tomcat（127.0.0.1:8080）。
# 后续学习负载均衡时，可以在这里添加 weight、backup、max_fails 等参数。
upstream backend_servers {
    # 默认轮询（round-robin）策略。
    # 如果有多个 server，请求会依次分发。
    server 127.0.0.1:8080 weight=1;

    # 示例（默认注释掉）：再启动一个后端实例在 8082 端口即可测试负载均衡
    # server 127.0.0.1:8082 weight=1;
}

# ------------------------------------------------------------------------------
# server 块：一个虚拟主机。
# ------------------------------------------------------------------------------
server {
    # listen：监听的端口。80 是 HTTP 默认端口，需要 root 权限；
    # 如果无法使用 80，可改为 8088，然后通过 http://localhost:8088 访问。
    listen 8088;

    # server_name：域名。本地学习用 localhost 或 _（匹配任意域名）均可。
    server_name localhost;

    # 项目根目录：指向 Umi 构建产物 dist 目录。
    # Nginx 会在这个目录下查找请求的文件。
    root /home/charles/code/nginxdemo/frontend/dist;

    # 默认索引文件
    index index.html;

    # --------------------------------------------------------------------------
    # location /：匹配所有以 / 开头的请求（最低优先级，兜底）。
    # --------------------------------------------------------------------------
    # 对于单页应用（SPA），刷新页面或直接访问 /user 时，
    # 服务器上并不存在 /user.html 文件，因此需要把所有请求都回退到 index.html，
    # 由前端路由接管。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # location /api/：反向代理到 Tomcat 后端。
    # --------------------------------------------------------------------------
    # 当前端请求 /api/users 时，Nginx 会把它转发到：
    # http://backend_servers/backend/api/users
    # 其中 backend_servers 解析为 127.0.0.1:8080，
    # /backend 是 WAR 包在 Tomcat 中的上下文路径。
    location /api/ {
        # proxy_pass 指定反向代理目标，后面跟 upstream 名称或具体地址。
        proxy_pass http://backend_servers/backend/api/;

        # 设置请求头，让后端能获取真实客户端信息。
        # Host：保留原始域名，否则 Tomcat 可能找不到对应的 Host。
        proxy_set_header Host $host;

        # X-Real-IP：把客户端真实 IP 传给后端。
        proxy_set_header X-Real-IP $remote_addr;

        # X-Forwarded-For：经过多层代理时，记录完整代理链路。
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # X-Forwarded-Proto：告诉后端原始协议是 http 还是 https。
        proxy_set_header X-Forwarded-Proto $scheme;

        # 代理连接超时时间（秒）。
        proxy_connect_timeout 30;
        proxy_send_timeout 30;
        proxy_read_timeout 30;
    }

    # --------------------------------------------------------------------------
    # 静态资源缓存（可选）：给 JS/CSS/图片等设置长期缓存，提高访问速度。
    # --------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        # 缓存 30 天
        expires 30d;
        # 允许浏览器使用缓存，不向服务器确认
        add_header Cache-Control "public, immutable";
    }

    # --------------------------------------------------------------------------
    # 错误页面配置
    # --------------------------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        # 内置的简单错误页面
        root /home/charles/code/nginxdemo/nginx/html;
    }
}

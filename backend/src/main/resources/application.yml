# Spring Boot 应用配置文件（YAML 格式）。
# 学习点：
# 1. server.servlet.context-path：设置应用的上下文路径。
#    打成 WAR 放到 Tomcat 后，访问地址前缀是 /backend，与 WAR 包名一致。
#    这里显式配置，避免不同环境行为不一致。
# 2. server.port：开发时内嵌 Tomcat 的端口。外置 Tomcat 部署时会忽略此项，由 Tomcat 的 Connector 决定。
# 3. logging.level：调整日志级别，方便学习时查看请求处理过程。

server:
  port: 8081
  servlet:
    context-path: /backend

spring:
  application:
    name: nginxdemo-backend

logging:
  level:
    org.apache.catalina: INFO
    com.example.demo: DEBUG
